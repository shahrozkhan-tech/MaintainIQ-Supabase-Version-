<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>History · MaintainIQ</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
<div class="sidebar-scrim"></div>
<div class="app-shell">

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark"><i data-lucide="scan-line"></i></div>
      <div class="brand-name">Maintain<span>IQ</span></div>
    </div>
    <nav class="nav-list">
      <a class="nav-item" href="dashboard.html"><i data-lucide="layout-dashboard"></i> Dashboard</a>
      <a class="nav-item" href="assets.html"><i data-lucide="boxes"></i> Assets</a>
      <a class="nav-item" href="qr.html"><i data-lucide="qr-code"></i> QR Codes</a>
      <a class="nav-item" href="tickets.html"><i data-lucide="ticket"></i> Tickets</a>
      <a class="nav-item active" href="history.html"><i data-lucide="history"></i> History</a>
      <a class="nav-item" href="profile.html"><i data-lucide="user-circle"></i> Profile</a>
      <a class="nav-item" href="settings.html"><i data-lucide="settings"></i> Settings</a>
    </nav>
    <div class="sidebar-footer">
      <div class="flex items-center gap-12">
        <div class="avatar" data-user-initials>?</div>
        <div>
          <div style="font-size:13px;font-weight:700" data-user-name>Loading...</div>
          <div style="font-size:11.5px;color:var(--text-muted)" data-user-email></div>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm w-full" onclick="handleLogout()"><i data-lucide="log-out" style="width:15px;height:15px"></i> Logout</button>
    </div>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <div class="flex items-center gap-12">
        <button class="btn-icon hamburger"><i data-lucide="menu"></i></button>
        <h1>Asset History</h1>
      </div>
      <div class="flex items-center gap-12">
        <button class="theme-toggle" data-theme-toggle></button>
      </div>
    </header>

    <main class="page-content">
      <div class="toolbar">
        <select class="input filter-select" id="history-asset-select" style="min-width:260px">
          <option value="">Select an asset...</option>
        </select>
      </div>
      <div class="glass-card card-pad" id="history-container">
        <div class="empty-state"><i data-lucide="mouse-pointer-click"></i><span>Choose an asset above to view its history</span></div>
      </div>
    </main>
  </div>
</div>

<nav class="bottom-nav">
  <a class="nav-item" href="dashboard.html"><i data-lucide="layout-dashboard"></i>Home</a>
  <a class="nav-item" href="assets.html"><i data-lucide="boxes"></i>Assets</a>
  <a class="nav-item" href="qr.html"><i data-lucide="qr-code"></i>QR</a>
  <a class="nav-item" href="tickets.html"><i data-lucide="ticket"></i>Tickets</a>
  <a class="nav-item" href="profile.html"><i data-lucide="user-circle"></i>Profile</a>
</nav>

<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/history.js"></script>
<script>
  (async function () {
    bootCommon();
    const session = await requireAuth();
    if (!session) return;
    await loadUserBadge();
    initHistoryPage();
  })();
</script>
</body>
</html>
