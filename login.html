<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Sign In · MaintainIQ</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/auth.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>

<button class="theme-toggle auth-theme-toggle" data-theme-toggle></button>

<div class="auth-wrap">
  <div class="glass-card auth-card">
    <div class="auth-brand">
      <div class="brand-mark"><i data-lucide="scan-line"></i></div>
      <div class="brand-name">Maintain<span>IQ</span></div>
    </div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to manage your assets and tickets</p>

    <div id="auth-error" class="auth-error hidden"></div>

    <form id="login-form">
      <div class="field">
        <label for="login-email">Email</label>
        <div class="input-icon-wrap">
          <i data-lucide="mail"></i>
          <input class="input" type="email" id="login-email" placeholder="you@company.com" required>
        </div>
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <div class="input-icon-wrap">
          <i data-lucide="lock"></i>
          <input class="input" type="password" id="login-password" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" id="login-btn" class="btn btn-primary btn-block">Sign In</button>
    </form>

    <p class="auth-footer">Don't have an account? <a href="signup.html">Create one</a></p>
  </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script>
  (async function () {
    bootCommon();
    await redirectIfAuthed();
    document.getElementById("login-form").addEventListener("submit", handleLogin);
  })();
</script>
</body>
</html>
