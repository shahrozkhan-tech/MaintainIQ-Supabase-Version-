<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>QR Codes · MaintainIQ</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
<div class="sidebar-scrim"></div>
<div class="app-shell">

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark"><i data-lucide="scan-line"></i></div>
      <div class="brand-name">Maintain<span>IQ</span></div>
    </div>
    <nav class="nav-list">
      <a class="nav-item" href="dashboard.html"><i data-lucide="layout-dashboard"></i> Dashboard</a>
      <a class="nav-item" href="assets.html"><i data-lucide="boxes"></i> Assets</a>
      <a class="nav-item active" href="qr.html"><i data-lucide="qr-code"></i> QR Codes</a>
      <a class="nav-item" href="tickets.html"><i data-lucide="ticket"></i> Tickets</a>
      <a class="nav-item" href="history.html"><i data-lucide="history"></i> History</a>
      <a class="nav-item" href="profile.html"><i data-lucide="user-circle"></i> Profile</a>
      <a class="nav-item" href="settings.html"><i data-lucide="settings"></i> Settings</a>
    </nav>
    <div class="sidebar-footer">
      <div class="flex items-center gap-12">
        <div class="avatar" data-user-initials>?</div>
        <div>
          <div style="font-size:13px;font-weight:700" data-user-name>Loading...</div>
          <div style="font-size:11.5px;color:var(--text-muted)" data-user-email></div>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm w-full" onclick="handleLogout()"><i data-lucide="log-out" style="width:15px;height:15px"></i> Logout</button>
    </div>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <div class="flex items-center gap-12">
        <button class="btn-icon hamburger"><i data-lucide="menu"></i></button>
        <h1>QR Codes</h1>
      </div>
      <div class="flex items-center gap-12">
        <button class="theme-toggle" data-theme-toggle></button>
      </div>
    </header>

    <main class="page-content">
      <div class="toolbar">
        <div class="input-icon-wrap">
          <i data-lucide="search"></i>
          <input class="input" id="qr-search" placeholder="Search by asset name or code...">
        </div>
      </div>
      <div class="card-grid" id="qr-grid">
        <div class="loading-row"><span class="spinner"></span> Loading assets...</div>
      </div>
    </main>
  </div>
</div>

<nav class="bottom-nav">
  <a class="nav-item" href="dashboard.html"><i data-lucide="layout-dashboard"></i>Home</a>
  <a class="nav-item" href="assets.html"><i data-lucide="boxes"></i>Assets</a>
  <a class="nav-item active" href="qr.html"><i data-lucide="qr-code"></i>QR</a>
  <a class="nav-item" href="tickets.html"><i data-lucide="ticket"></i>Tickets</a>
  <a class="nav-item" href="profile.html"><i data-lucide="user-circle"></i>Profile</a>
</nav>

<div class="modal-overlay" id="qr-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="qr-modal-title">Asset QR</h3>
      <button class="btn-icon" onclick="closeModal('qr-modal')"><i data-lucide="x"></i></button>
    </div>
    <div class="qr-tile">
      <div id="qr-canvas-wrap"></div>
      <div class="muted" id="qr-modal-code" style="font-size:13px;font-weight:700"></div>
      <div class="qr-actions">
        <button class="btn btn-secondary btn-sm" onclick="downloadQR()"><i data-lucide="download" style="width:14px;height:14px"></i> Download</button>
        <button class="btn btn-secondary btn-sm" onclick="printQR()"><i data-lucide="printer" style="width:14px;height:14px"></i> Print</button>
        <button class="btn btn-secondary btn-sm" onclick="regenerateQR()"><i data-lucide="refresh-ccw" style="width:14px;height:14px"></i> Regenerate</button>
      </div>
    </div>
  </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/qr.js"></script>
<script>
  (async function () {
    bootCommon();
    const session = await requireAuth();
    if (!session) return;
    await loadUserBadge();
    initQrPage();
  })();
</script>
</body>
</html>
