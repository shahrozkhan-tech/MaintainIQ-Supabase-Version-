<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Assets · MaintainIQ</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
<div class="sidebar-scrim"></div>
<div class="app-shell">

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark"><i data-lucide="scan-line"></i></div>
      <div class="brand-name">Maintain<span>IQ</span></div>
    </div>
    <nav class="nav-list">
      <a class="nav-item" href="dashboard.html"><i data-lucide="layout-dashboard"></i> Dashboard</a>
      <a class="nav-item active" href="assets.html"><i data-lucide="boxes"></i> Assets</a>
      <a class="nav-item" href="qr.html"><i data-lucide="qr-code"></i> QR Codes</a>
      <a class="nav-item" href="tickets.html"><i data-lucide="ticket"></i> Tickets</a>
      <a class="nav-item" href="history.html"><i data-lucide="history"></i> History</a>
      <a class="nav-item" href="profile.html"><i data-lucide="user-circle"></i> Profile</a>
      <a class="nav-item" href="settings.html"><i data-lucide="settings"></i> Settings</a>
    </nav>
    <div class="sidebar-footer">
      <div class="flex items-center gap-12">
        <div class="avatar" data-user-initials>?</div>
        <div>
          <div style="font-size:13px;font-weight:700" data-user-name>Loading...</div>
          <div style="font-size:11.5px;color:var(--text-muted)" data-user-email></div>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm w-full" onclick="handleLogout()"><i data-lucide="log-out" style="width:15px;height:15px"></i> Logout</button>
    </div>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <div class="flex items-center gap-12">
        <button class="btn-icon hamburger"><i data-lucide="menu"></i></button>
        <h1>Assets</h1>
      </div>
      <div class="flex items-center gap-12">
        <button class="theme-toggle" data-theme-toggle></button>
        <button class="btn btn-primary" onclick="openAddAssetModal()"><i data-lucide="plus" style="width:16px;height:16px"></i> Add Asset</button>
      </div>
    </header>

    <main class="page-content">
      <div class="toolbar">
        <div class="input-icon-wrap">
          <i data-lucide="search"></i>
          <input class="input" id="asset-search" placeholder="Search assets by name or code...">
        </div>
        <select class="input filter-select" id="filter-category"><option value="">All Categories</option></select>
        <select class="input filter-select" id="filter-location"><option value="">All Locations</option></select>
        <select class="input filter-select" id="filter-status">
          <option value="">All Statuses</option>
          <option value="active">Active</option>
          <option value="maintenance">Maintenance</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>

      <div class="glass-card" style="overflow-x:auto">
        <table class="data-table" id="assets-table">
          <thead>
            <tr>
              <th>Code</th><th>Name</th><th>Category</th><th>Location</th><th>Status</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="assets-tbody">
            <tr><td colspan="6"><div class="loading-row"><span class="spinner"></span> Loading assets...</div></td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
</div>

<nav class="bottom-nav">
  <a class="nav-item" href="dashboard.html"><i data-lucide="layout-dashboard"></i>Home</a>
  <a class="nav-item active" href="assets.html"><i data-lucide="boxes"></i>Assets</a>
  <a class="nav-item" href="qr.html"><i data-lucide="qr-code"></i>QR</a>
  <a class="nav-item" href="tickets.html"><i data-lucide="ticket"></i>Tickets</a>
  <a class="nav-item" href="profile.html"><i data-lucide="user-circle"></i>Profile</a>
</nav>

<!-- Add / Edit Asset Modal -->
<div class="modal-overlay" id="asset-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="asset-modal-title">Add Asset</h3>
      <button class="btn-icon" onclick="closeModal('asset-modal')"><i data-lucide="x"></i></button>
    </div>
    <form id="asset-form">
      <input type="hidden" id="asset-id">
      <div class="field">
        <label>Asset Code</label>
        <input class="input" id="asset-code" disabled placeholder="Auto-generated">
      </div>
      <div class="field">
        <label>Asset Name</label>
        <input class="input" id="asset-name" required placeholder="e.g. HVAC Unit 3">
      </div>
      <div class="field">
        <label>Category</label>
        <input class="input" id="asset-category" required placeholder="e.g. HVAC, Electrical, Plumbing" list="category-list">
        <datalist id="category-list"></datalist>
      </div>
      <div class="field">
        <label>Location</label>
        <input class="input" id="asset-location" required placeholder="e.g. Building A, Floor 2" list="location-list">
        <datalist id="location-list"></datalist>
      </div>
      <div class="field">
        <label>Status</label>
        <select class="input" id="asset-status">
          <option value="active">Active</option>
          <option value="maintenance">Maintenance</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="asset-save-btn">Save Asset</button>
    </form>
  </div>
</div>

<!-- View Asset Modal -->
<div class="modal-overlay" id="view-asset-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>Asset Details</h3>
      <button class="btn-icon" onclick="closeModal('view-asset-modal')"><i data-lucide="x"></i></button>
    </div>
    <div id="view-asset-body"></div>
  </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/assets.js"></script>
<script>
  (async function () {
    bootCommon();
    const session = await requireAuth();
    if (!session) return;
    await loadUserBadge();
    initAssetsPage();
  })();
</script>
</body>
</html>
