<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Settings · MaintainIQ</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
<div class="sidebar-scrim"></div>
<div class="app-shell">

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark"><i data-lucide="scan-line"></i></div>
      <div class="brand-name">Maintain<span>IQ</span></div>
    </div>
    <nav class="nav-list">
      <a class="nav-item" href="dashboard.html"><i data-lucide="layout-dashboard"></i> Dashboard</a>
      <a class="nav-item" href="assets.html"><i data-lucide="boxes"></i> Assets</a>
      <a class="nav-item" href="qr.html"><i data-lucide="qr-code"></i> QR Codes</a>
      <a class="nav-item" href="tickets.html"><i data-lucide="ticket"></i> Tickets</a>
      <a class="nav-item" href="history.html"><i data-lucide="history"></i> History</a>
      <a class="nav-item" href="profile.html"><i data-lucide="user-circle"></i> Profile</a>
      <a class="nav-item active" href="settings.html"><i data-lucide="settings"></i> Settings</a>
    </nav>
    <div class="sidebar-footer">
      <div class="flex items-center gap-12">
        <div class="avatar" data-user-initials>?</div>
        <div>
          <div style="font-size:13px;font-weight:700" data-user-name>Loading...</div>
          <div style="font-size:11.5px;color:var(--text-muted)" data-user-email></div>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm w-full" onclick="handleLogout()"><i data-lucide="log-out" style="width:15px;height:15px"></i> Logout</button>
    </div>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <div class="flex items-center gap-12">
        <button class="btn-icon hamburger"><i data-lucide="menu"></i></button>
        <h1>Settings</h1>
      </div>
      <div class="flex items-center gap-12">
        <button class="theme-toggle" data-theme-toggle></button>
      </div>
    </header>

    <main class="page-content">
      <div class="grid-2">
        <div class="glass-card card-pad">
          <div class="card-title">Appearance</div>
          <p class="muted" style="margin-bottom:14px;font-size:13.5px">Choose how MaintainIQ looks on this device.</p>
          <div class="flex gap-12">
            <button class="btn btn-secondary" id="set-light-btn"><i data-lucide="sun" style="width:15px;height:15px"></i> Light</button>
            <button class="btn btn-secondary" id="set-dark-btn"><i data-lucide="moon" style="width:15px;height:15px"></i> Dark</button>
          </div>
        </div>

        <div class="glass-card card-pad">
          <div class="card-title">Profile</div>
          <form id="profile-form">
            <div class="field">
              <label>Full Name</label>
              <input class="input" id="settings-name" placeholder="Your name">
            </div>
            <div class="field">
              <label>Email</label>
              <input class="input" id="settings-email" disabled>
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="profile-save-btn">Save Changes</button>
          </form>
        </div>

        <div class="glass-card card-pad">
          <div class="card-title">Change Password</div>
          <form id="password-form">
            <div class="field">
              <label>New Password</label>
              <input class="input" type="password" id="settings-password" placeholder="At least 6 characters" minlength="6" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="password-save-btn">Update Password</button>
          </form>
        </div>

        <div class="glass-card card-pad">
          <div class="card-title">Session</div>
          <p class="muted" style="margin-bottom:14px;font-size:13.5px">Sign out of MaintainIQ on this device.</p>
          <button class="btn btn-danger btn-block" onclick="handleLogout()"><i data-lucide="log-out" style="width:15px;height:15px"></i> Logout</button>
        </div>
      </div>
    </main>
  </div>
</div>

<nav class="bottom-nav">
  <a class="nav-item" href="dashboard.html"><i data-lucide="layout-dashboard"></i>Home</a>
  <a class="nav-item" href="assets.html"><i data-lucide="boxes"></i>Assets</a>
  <a class="nav-item" href="qr.html"><i data-lucide="qr-code"></i>QR</a>
  <a class="nav-item" href="tickets.html"><i data-lucide="ticket"></i>Tickets</a>
  <a class="nav-item" href="profile.html"><i data-lucide="user-circle"></i>Profile</a>
</nav>

<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script>
  (async function () {
    bootCommon();
    const session = await requireAuth();
    if (!session) return;
    const user = await loadUserBadge();
    if (user) {
      document.getElementById("settings-name").value = user.user_metadata?.full_name || "";
      document.getElementById("settings-email").value = user.email;
    }

    document.getElementById("set-light-btn").addEventListener("click", () => {
      document.documentElement.setAttribute("data-theme", "light");
      localStorage.setItem("miq-theme", "light");
      renderThemeIcon("light");
    });
    document.getElementById("set-dark-btn").addEventListener("click", () => {
      document.documentElement.setAttribute("data-theme", "dark");
      localStorage.setItem("miq-theme", "dark");
      renderThemeIcon("dark");
    });

    document.getElementById("profile-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("profile-save-btn");
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Saving...';
      const fullName = document.getElementById("settings-name").value.trim();
      const { error } = await supabaseClient.auth.updateUser({ data: { full_name: fullName } });
      btn.disabled = false; btn.textContent = "Save Changes";
      if (error) return showToast(error.message, "error");
      showToast("Profile updated", "success");
      loadUserBadge();
    });

    document.getElementById("password-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("password-save-btn");
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Updating...';
      const password = document.getElementById("settings-password").value;
      const { error } = await supabaseClient.auth.updateUser({ password });
      btn.disabled = false; btn.textContent = "Update Password";
      if (error) return showToast(error.message, "error");
      showToast("Password updated", "success");
      document.getElementById("password-form").reset();
    });
  })();
</script>
</body>
</html>
